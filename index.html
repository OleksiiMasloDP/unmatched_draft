<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Draft UI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f6f7fb;
}

/* TOP */
.top-wrap {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 10px;
}

.turn-banner {
  color: white;
  font-weight: 700;
  text-align: center;
  padding: 10px;
  border-radius: 12px;
}

/* controls UNDER turn */
.controls-row {
  display: flex;
  gap: 8px;
  width: 100%;
}

.controls-row input,
.controls-row select {
  flex: 1;
}

/* CHARACTER CARD FULL IMAGE */
.character {
  cursor: pointer;
  transition: .15s;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  height: 170px;
}

.character:hover {
  transform: scale(1.03);
}

.character img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* overlay */
.char-name {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  color: white;
  font-size: 12px;
  padding: 8px;
  opacity: 0;
  transition: .15s;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.character:hover .char-name {
  opacity: 1;
}

/* percent bottom */
.percent {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  text-align: center;
  font-weight: 800;
  padding: 6px;
  color: white;
}

/* BAN */
.slot-box {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.ban-slot {
  height: 42px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* faded bg */
.ban-slot::before {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--ban-color);
  opacity: 0.12;
}

/* diagonal strike */
.ban-slot::after {
  content: "";
  position: absolute;
  left: -30%;
  top: 50%;
  width: 160%;
  height: 2px;
  background: rgba(0,0,0,0.35);
  transform: rotate(-35deg);
}

.ban-text {
  position: relative;
  opacity: 0.6;
}

/* PICK CARD FULL IMAGE */
.pick-card {
  cursor: pointer;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  height: 220px; /* increased */
  border: 1px solid #e5e7eb;
  transition: .15s;
}

.pick-card:hover {
  transform: scale(1.03);
}

.pick-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* hover overlay */
.pick-name {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  color: white;
  font-size: 12px;
  padding: 8px;
  opacity: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: .15s;
}

.pick-card:hover .pick-name {
  opacity: 1;
}
</style>
</head>

<body>

<div id="app">
  <div class="container py-3">

    <!-- TURN -->
    <div class="top-wrap">

      <div class="turn-banner" :style="{ background: turnColor }">
        {{ turnText }}
      </div>

      <!-- CONTROLS UNDER TURN -->
      <div class="controls-row">
        <input v-model="search" class="form-control form-control-sm" placeholder="Search..." />

        <select v-model="firstPicker" class="form-select form-select-sm">
          <option value="player">User first</option>
          <option value="opponent">Opponent first</option>
        </select>

        <select v-model="sortMode" class="form-select form-select-sm">
          <option value="elo">Draft strength (%)</option>
          <option value="name">Name</option>
        </select>

        <button class="btn btn-warning btn-sm" @click="undo" :disabled="history.length === 0">
          Undo
        </button>
      </div>
    </div>

    <div class="row">

      <!-- LEFT -->
      <div class="col-md-3">
        <input v-model="player.name" class="form-control mb-2"
          :style="{ background: player.color, color:'white', fontWeight:'700', textAlign:'center' }"/>

        <h6>Bans</h6>
        <div class="slot-box">
          <div v-for="i in 3" class="ban-slot" :style="{ '--ban-color': player.color }">
            <span class="ban-text">{{ player.bans[i-1]?.name || '—' }}</span>
          </div>
        </div>

        <h6 class="mt-3">Picks</h6>
        <div class="slot-box">
          <div v-for="char in player.picks" class="pick-card">
            <img :src="char.image" />
            <div class="pick-name">
              <div style="font-weight:700">{{ char.name }}</div>
              <div v-for="enemy in opponent.picks">
                <div v-if="char.matchups?.[enemy.name]">
                  {{ getMatchupText(char, enemy) }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CENTER -->
      <div class="col-md-6">
        <div class="row g-2">

          <div v-for="char in filtered" :key="char.id" class="col-3">
            <div class="character" @click="pick(char)">
              <img :src="char.image" />

              <div class="char-name">
                <div style="font-weight:700">{{ char.name }}</div>

                <div v-for="enemy in opponent.picks">
                  <div v-if="char.matchups?.[enemy.name]">
                    {{ getMatchupText(char, enemy) }}
                  </div>
                </div>
              </div>

              <div class="percent" :style="{ background: getColor(getPickPercent(char)) }">
                {{ getPickPercent(char) }}%
              </div>

            </div>
          </div>

        </div>
      </div>

      <!-- RIGHT -->
      <div class="col-md-3">
        <input v-model="opponent.name" class="form-control mb-2"
          :style="{ background: opponent.color, color:'white', fontWeight:'700', textAlign:'center' }"/>

        <h6>Bans</h6>
        <div class="slot-box">
          <div v-for="i in 3" class="ban-slot" :style="{ '--ban-color': opponent.color }">
            <span class="ban-text">{{ opponent.bans[i-1]?.name || '—' }}</span>
          </div>
        </div>

        <h6 class="mt-3">Picks</h6>
        <div class="slot-box">
          <div v-for="char in opponent.picks" class="pick-card">
            <img :src="char.image" />
            <div class="pick-name">
              <div style="font-weight:700">{{ char.name }}</div>
              <div v-for="enemy in player.picks">
                <div v-if="char.matchups?.[enemy.name]">
                  {{ getMatchupText(char, enemy) }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
const { createApp, ref, computed } = Vue

createApp({
  setup() {

    const search = ref("")
    const sortMode = ref("elo")
    const firstPicker = ref("player")

    const player = ref({ name:"User", color:"#0d6efd", bans:[], picks:[] })
    const opponent = ref({ name:"Opponent", color:"#dc3545", bans:[], picks:[] })

    const characters = ref([])
    const history = ref([])

    const MAX_ELO = 1600
    const MIN_ELO = 1300

    const loadChars = async () => {
      const res = await fetch("./characters.json")
      characters.value = await res.json()
    }
    loadChars()

    const takenIds = computed(() => {
      return new Set([
        ...player.value.bans,
        ...player.value.picks,
        ...opponent.value.bans,
        ...opponent.value.picks
      ].map(c => c.id))
    })

    const filtered = computed(() => {
      let arr = characters.value.filter(c => !takenIds.value.has(c.id))

      if (search.value) {
        arr = arr.filter(c =>
          c.name.toLowerCase().includes(search.value.toLowerCase())
        )
      }

      if (sortMode.value === "name") return arr.sort((a,b)=>a.name.localeCompare(b.name))

      return arr.sort((a,b)=>getPickPercent(b) - getPickPercent(a))
    })

    function getPickPercent(char) {
      const clamped = Math.max(MIN_ELO, Math.min(MAX_ELO, char.elo))
      const base = ((clamped - MIN_ELO) / (MAX_ELO - MIN_ELO)) * 100

      const enemies = opponent.value.picks
      if (!enemies.length) return Math.round(base)

      let total = 0
      let count = 0

      for (const e of enemies) {
        const mu = char.matchups?.[e.name]
        if (!mu) continue
        total += (mu.winrate - 50)
        count++
      }

      const avg = count ? total / count : 0
      return Math.max(0, Math.min(100, Math.round(base + avg * 1.5)))
    }

    function getColor(p) {
      if (p >= 75) return "#198754"
      if (p >= 50) return "#ffc107"
      if (p >= 30) return "#fd7e14"
      return "#dc3545"
    }

    function getMatchupText(char, enemy) {
      const mu = char.matchups?.[enemy.name]
      if (!mu) return ""

      const diff = mu.winrate - 50

      if (diff > 0) return `vs ${enemy.name}: ${mu.winrate}% (+${diff})`
      if (diff < 0) return `vs ${enemy.name}: ${mu.winrate}% (${diff})`
      return `vs ${enemy.name}: ${mu.winrate}%`
    }

    const sequenceBase = [
      { type:"ban", player:"player" },
      { type:"ban", player:"opponent" },
      { type:"ban", player:"player" },
      { type:"ban", player:"opponent" },
      { type:"ban", player:"player" },
      { type:"ban", player:"opponent" },
      { type:"pick", player:"player" },
      { type:"pick", player:"opponent" },
      { type:"pick", player:"opponent" },
      { type:"pick", player:"player" },
      { type:"pick", player:"player" },
      { type:"pick", player:"opponent" },
      { type:"pick", player:"opponent" },
      { type:"pick", player:"player" }
    ]

    const sequence = computed(() => {
      if (firstPicker.value === "player") return sequenceBase
      return sequenceBase.map(s => ({
        ...s,
        player: s.player === "player" ? "opponent" : "player"
      }))
    })

    const step = ref(0)
    const current = computed(() => sequence.value[step.value] || null)

    const turnText = computed(() => {
      if (!current.value) return "Done"
      return `${current.value.player} ${current.value.type}`
    })

    const turnColor = computed(() => {
      if (!current.value) return "#6c757d"
      return current.value.player === "player"
        ? player.value.color
        : opponent.value.color
    })

    function pick(char) {
      if (!current.value) return

      const target = current.value.player === "player"
        ? player.value
        : opponent.value

      if (current.value.type === "ban") target.bans.push(char)
      else target.picks.push(char)

      history.value.push({
        char,
        player: current.value.player,
        type: current.value.type
      })

      step.value++
    }

    function undo() {
      const last = history.value.pop()
      if (!last) return

      step.value--

      const target = last.player === "player"
        ? player.value
        : opponent.value

      const arr = last.type === "ban" ? target.bans : target.picks
      arr.pop()
    }

    return {
      search,
      sortMode,
      firstPicker,
      player,
      opponent,
      filtered,
      pick,
      undo,
      getPickPercent,
      getColor,
      getMatchupText,
      turnText,
      turnColor,
      history
    }
  }
}).mount("#app")
</script>

</body>
</html>
