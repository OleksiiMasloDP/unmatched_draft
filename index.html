<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Draft UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f6f7fb;
    }

    .character {
      cursor: pointer;
      transition: .15s;
      border-radius: 12px;
      background: white;
      border: 1px solid #e5e7eb;
    }

    .character:hover {
      transform: scale(1.03);
      border-color: #0d6efd;
    }

    .slot-box {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slot {
      height: 42px;
      border-radius: 10px;
      background: white;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }

    .turn-banner {
      color: white;
      font-weight: 700;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .player-input {
      width: 100%;
      border: none;
      font-weight: 700;
      text-align: center;
      padding: 6px;
      border-radius: 10px;
      color: white;
      outline: none;
    }
  </style>
</head>

<body>

<div id="app">
  <div class="container py-3">

    <div class="turn-banner" :style="{ background: turnColor }">
      {{ turnText }}
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <input v-model="search" class="form-control" placeholder="Search..." />
      </div>

      <div class="col-md-6">
        <select v-model="sortMode" class="form-select">
          <option value="name">Sort: name</option>
          <option value="elo">Sort: elo</option>
        </select>
      </div>
    </div>

    <div class="row">

      <div class="col-md-3">

        <input v-model="p1.name"
               class="player-input mb-2"
               :style="{ background: p1.color }" />

        <h6>Bans</h6>
        <div class="slot-box">
          <div v-for="i in 3" class="slot">
            {{ p1.bans[i-1]?.name || '—' }}
          </div>
        </div>

        <h6 class="mt-3">Picks</h6>
        <div class="slot-box">
          <div v-for="i in 4" class="slot">
            {{ p1.picks[i-1]?.name || '—' }}
          </div>
        </div>

      </div>

      <div class="col-md-6">
        <div class="row g-2">

          <div v-for="char in filtered" :key="char.id" class="col-4">
            <div class="card character text-center p-2" @click="pick(char)">
              <div class="fw-bold">{{ char.name }}</div>

              <span class="badge mt-2"
                    :style="{ background: getColor(getPickPercent(char)), color: 'white' }">
                {{ getPickPercent(char) }}%
              </span>

              <small class="d-block mt-1 text-muted">
                elo {{ char.elo }}
              </small>
            </div>
          </div>

        </div>
      </div>

      <div class="col-md-3">

        <input v-model="p2.name"
               class="player-input mb-2"
               :style="{ background: p2.color }" />

        <h6>Bans</h6>
        <div class="slot-box">
          <div v-for="i in 3" class="slot">
            {{ p2.bans[i-1]?.name || '—' }}
          </div>
        </div>

        <h6 class="mt-3">Picks</h6>
        <div class="slot-box">
          <div v-for="i in 4" class="slot">
            {{ p2.picks[i-1]?.name || '—' }}
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
const { createApp, ref, computed } = Vue

createApp({
  setup() {

    const search = ref("")
    const sortMode = ref("elo")

    const p1 = ref({
      name: "Player 1",
      color: "#0d6efd",
      bans: [],
      picks: []
    })

    const p2 = ref({
      name: "Player 2",
      color: "#dc3545",
      bans: [],
      picks: []
    })

    const characters = ref([])

    const MAX_ELO = 1600
    const MIN_ELO = 1300

    async function loadChars() {
      const res = await fetch("./characters.json")
      characters.value = await res.json()
    }

    loadChars()

    const takenIds = computed(() => {
      return new Set([
        ...p1.value.bans,
        ...p1.value.picks,
        ...p2.value.bans,
        ...p2.value.picks
      ].map(c => c.id))
    })

    const filtered = computed(() => {
      let arr = characters.value.filter(c => !takenIds.value.has(c.id))

      if (search.value) {
        arr = arr.filter(c =>
          c.name.toLowerCase().includes(search.value.toLowerCase())
        )
      }

      if (sortMode.value === "name") {
        arr.sort((a,b)=>a.name.localeCompare(b.name))
      } else {
        arr.sort((a,b)=>b.elo - a.elo)
      }

      return arr
    })

    function getPickPercent(char) {
      const clamped = Math.max(MIN_ELO, Math.min(MAX_ELO, char.elo))
      return Math.round(((clamped - MIN_ELO) / (MAX_ELO - MIN_ELO)) * 100)
    }

    function getColor(p) {
      if (p >= 75) return "#198754"
      if (p >= 50) return "#ffc107"
      if (p >= 30) return "#fd7e14"
      return "#dc3545"
    }

    // draft order
    const draft_order = [
      { type: "ban", player: "p1" },
      { type: "ban", player: "p2" },
      { type: "ban", player: "p1" },
      { type: "ban", player: "p2" },
      { type: "ban", player: "p1" },
      { type: "ban", player: "p2" },

      { type: "pick", player: "p1" },
      { type: "pick", player: "p2" },
      { type: "pick", player: "p2" },
      { type: "pick", player: "p1" },
      { type: "pick", player: "p1" },
      { type: "pick", player: "p2" },
      { type: "pick", player: "p2" },
      { type: "pick", player: "p1" }
    ]

    const step = ref(0)

    const current = computed(() => draft_order[step.value] || null)

    const turnText = computed(() => {
      if (!current.value) return "Draft finished"
      const name = current.value.player === "p1" ? p1.value.name : p2.value.name
      return `${name} ${current.value.type}`
    })

    const turnColor = computed(() => {
      if (!current.value) return "#6c757d"
      return current.value.player === "p1" ? p1.value.color : p2.value.color
    })

    function pick(char) {
      if (!current.value) return

      const target = current.value.player === "p1" ? p1.value : p2.value

      if (current.value.type === "ban") {
        if (target.bans.length < 3) {
          target.bans.push(char)
        }
      } else {
        if (target.picks.length < 4) {
          target.picks.push(char)
        }
      }

      step.value++
    }

    return {
      search,
      sortMode,
      filtered,
      pick,
      p1,
      p2,
      getPickPercent,
      getColor,
      turnText,
      turnColor
    }
  }
}).mount("#app")
</script>

</body>
</html>
